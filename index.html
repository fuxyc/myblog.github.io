<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fuxyc | Mi Espacio Personal</title>
    
    <meta property="og:title" content="Fuxyc | Mi Espacio Personal">
    <meta property="og:description" content="Bienvenido a mi blog personal. Conoce mis proyectos y redes sociales.">
    <meta property="og:image" content="https://chatphotos.uk/og-image.jpg"> 
    <meta property="og:url" content="https://chatphotos.uk">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="favicon.png">

    <style>
        /* --- VARIABLES DE COLOR (TEMA DINÁMICO) --- */
        :root {
            --bg-body: #f8f9fa;
            --bg-container: #ffffff;
            --text-primary: #333333;
            --text-secondary: #777777;
            --text-handle: #65676b;
            --border-container: transparent;
            --shadow-container: 0 10px 30px rgba(0, 0, 0, 0.05);
            
            --bg-dropdown: #2d2d2d;
            --text-dropdown: #ffffff;
            --hover-dropdown: #3d3d3d;
        }

        /* --- ESTILOS DE MODO OSCURO --- */
        body.dark-mode {
            --bg-body: #18191a;
            --bg-container: #242526;
            --text-primary: #e4e6eb;
            --text-secondary: #b0b3b8;
            --text-handle: #b0b3b8;
            --border-container: #3d3d3d;
            --shadow-container: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        /* --- ESTILOS BASE --- */
        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-body);
            margin: 0; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            transition: background-color 0.3s ease;
        }

        .profile-container {
            max-width: 600px;
            width: 90%;
            background-color: var(--bg-container);
            border-radius: 20px;
            box-shadow: var(--shadow-container);
            border: 1px solid var(--border-container);
            overflow: hidden;
            opacity: 0;
            animation: fadeIn 1s ease-out forwards;
            margin: 50px 0;
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }

        /* --- BANNER --- */
        .profile-banner {
            width: 100%;
            height: 200px;
            display: block;
            background-image: url('bg-image.gif'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
            filter: brightness(1.1); 
            opacity: 0;
            animation: slideInFromTop 1s ease-out 0.2s forwards;
        }

        .profile-header {
            padding: 0 40px 20px;
            text-align: center;
            position: relative;
            margin-top: -60px;
            z-index: 10;
        }

        /* --- MENÚ DE TRES PUNTITOS --- */
        .header-menu-container {
            position: absolute;
            top: 70px; /* Ajustado para que no choque con el banner */
            right: 20px;
            z-index: 20;
        }

        .menu-dots-btn {
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 10px;
            border-radius: 50%;
            transition: background-color 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .menu-dots-btn:hover {
            background-color: rgba(0,0,0,0.05);
        }

        body.dark-mode .menu-dots-btn:hover {
            background-color: rgba(255,255,255,0.1);
        }

        .dropdown-menu {
            position: absolute;
            top: 100%;
            right: 0;
            background-color: var(--bg-dropdown);
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            min-width: 180px;
            overflow: hidden;
            display: none; /* Se controla con JS */
            z-index: 100;
        }

        .dropdown-menu.show {
            display: block;
            animation: fadeIn 0.2s ease-out;
        }

        .dropdown-item {
            display: flex;
            align-items: center;
            width: 100%;
            padding: 12px 16px;
            border: none;
            background: transparent;
            color: white;
            font-family: 'Poppins', sans-serif;
            font-size: 0.9em;
            cursor: pointer;
            gap: 10px;
            transition: background 0.2s;
        }

        .dropdown-item:hover {
            background-color: var(--hover-dropdown);
        }

        /* --- PERFIL --- */
        .profile-pic {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 5px solid var(--bg-container);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            object-fit: cover;
            background-color: var(--bg-container);
            opacity: 0;
            animation: popIn 1s ease-out 0.5s forwards;
            transition: border-color 0.3s ease;
        }

        h1.profile-name {
            font-size: 2.2em; 
            font-weight: 700;
            color: var(--text-primary);
            margin-top: 15px;
            margin-bottom: 5px;
            opacity: 0;
            animation: slideInFromBottom 1s ease-out 0.8s forwards;
        }

        /* --- VERIFICADO CORREGIDO --- */
        .handle-container {
            display: flex;
            justify-content: center;
            align-items: center; 
            gap: 6px; 
            margin-bottom: 20px;
            opacity: 0;
            animation: slideInFromBottom 1s ease-out 1s forwards;
        }

        .profile-handle {
            color: var(--text-handle);
            font-size: 1.1em;
            margin: 0; 
        }

        .verified-icon {
            width: 20px; 
            height: 20px;
            display: flex;
            align-items: center;
        }

        .profile-bio {
            font-size: 1.1em;
            color: var(--text-secondary);
            margin-bottom: 30px;
            opacity: 0;
            animation: slideInFromBottom 1s ease-out 1.2s forwards;
        }

        /* --- BOTONES --- */
        .profile-links {
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding: 0 40px;
            margin-bottom: 40px;
            opacity: 0;
            animation: slideInFromBottom 1s ease-out 1.4s forwards;
        }

        .btn-profile {
            display: block;
            text-align: center;
            padding: 15px 20px;
            color: #ffffff;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-profile:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .btn-instagram { background-color: #E4405F; }
        .btn-github { background-color: #333333; }
        .btn-youtube { background-color: #FF0000; }

        body.dark-mode .btn-github {
            background-color: #f0f0f0;
            color: #18191a;
        }

        footer.profile-footer {
            text-align: center;
            font-size: 0.9em;
            color: #aaa;
            padding-bottom: 30px;
        }

        /* --- ANIMACIONES --- */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideInFromTop { from { transform: translateY(-30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes popIn { 0% { transform: scale(0.8); opacity: 0; } 80% { transform: scale(1.05); opacity: 0.8; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes slideInFromBottom { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        @media (max-width: 600px) {
            .profile-container { margin: 0; border-radius: 0; width: 100%; }
            .profile-header { padding: 0 20px 20px; }
            .profile-links { padding: 0 20px; }
            h1.profile-name { font-size: 1.8em; }
        }
    </style>
</head>

<body>
    <div class="profile-container">
        
        <div class="profile-banner"></div>
        
        <div class="profile-header">
            <div class="header-menu-container">
                <button class="menu-dots-btn" id="menuBtn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 13C12.5523 13 13 12.5523 13 12C13 11.4477 12.5523 11 12 11C11.4477 11 11 11.4477 11 12C11 12.5523 11.4477 13 12 13Z" stroke="#777" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M12 6C12.5523 6 13 5.55228 13 5C13 4.44772 12.5523 4 12 4C11.4477 4 11 4.44772 11 5C11 5.55228 11.4477 6 12 6Z" stroke="#777" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M12 20C12.5523 20 13 19.5523 13 19C13 18.4477 12.5523 18 12 18C11.4477 18 11 18.4477 11 19C11 19.5523 11.4477 20 12 20Z" stroke="#777" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
                <div class="dropdown-menu" id="dropdownMenu">
                    <button class="dropdown-item" id="darkModeBtn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 3c.132 0 .263 0 .393.007a9 9 0 0 0 7.599 15.98A9 9 0 1 1 12 3z"/>
                        </svg>
                        Modo Oscuro
                    </button>
                </div>
            </div>

            <img src="pfp.webp" alt="Foto de perfil de Fuxyc" class="profile-pic">
            
            <h1 class="profile-name">¡Hola a todos soy Fuxyc!</h1>
            
            <div class="handle-container">
                <p class="profile-handle">@fuxyc</p>
                <span class="verified-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
                        <circle fill="#1d9bf0" cx="24" cy="24" r="20"/>
                        <polyline fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" points="16,24 22,30 32,18"/>
                    </svg>
                </span>
            </div>
            
            <p class="profile-bio">Este es mi nuevo blog personal.</p>
        </div>
        
        <main class="profile-links">
            <a href="https://www.instagram.com/jarell.js" target="_blank" rel="noopener noreferrer" class="btn-profile btn-instagram">Instagram</a>
            <a href="https://github.com/fuxyc" target="_blank" rel="noopener noreferrer" class="btn-profile btn-github">GitHub</a>
            <a href="https://www.youtube.com/@fuxyc" target="_blank" rel="noopener noreferrer" class="btn-profile btn-youtube">YouTube</a>
        </main>
        
        <footer class="profile-footer">
            <p>&copy; 2026 Fuxyc - Hecho con ❤️</p>
        </footer>
        
    </div>

    <script>
        const menuBtn = document.getElementById('menuBtn');
        const dropdownMenu = document.getElementById('dropdownMenu');
        const darkModeBtn = document.getElementById('darkModeBtn');
        const body = document.body;

        // Abrir/Cerrar menú
        menuBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            dropdownMenu.classList.toggle('show');
        });

        // Cerrar al hacer clic fuera
        document.addEventListener('click', () => {
            dropdownMenu.classList.remove('show');
        });

        // Toggle Modo Oscuro
        darkModeBtn.addEventListener('click', () => {
            body.classList.toggle('dark-mode');
            const isDark = body.classList.contains('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        });

        // Cargar tema preferido
        if (localStorage.getItem('theme') === 'dark') {
            body.classList.add('dark-mode');
        }
    </script>
</body>
</html>
