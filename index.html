<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fuxyc | Mi Espacio Personal</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="favicon.png">

    <style>
        /* --- VARIABLES DE COLOR --- */
        :root {
            --bg-body: #f4f7f6;
            --bg-container: #ffffff;
            --text-primary: #1a1a1a;
            --text-secondary: #666666;
            --bg-dropdown: #2d2d2d;
        }

        body.dark-mode {
            --bg-body: #121212;
            --bg-container: #1e1e1e;
            --text-primary: #ffffff;
            --text-secondary: #bbb;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-body);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            transition: background-color 0.4s ease;
            overflow-x: hidden;
        }

        /* --- TARJETA MÁS GRANDE Y ANIMACIÓN DE ENTRADA --- */
        .container {
            background: var(--bg-container);
            border-radius: 32px; /* Un poco más redondeado para el nuevo tamaño */
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            text-align: center;
            max-width: 500px; /* Aumentado de 400px a 500px */
            width: 90%;
            overflow: hidden;
            margin: 40px 0;
            position: relative;
            
            /* Animación de entrada degradada y escala */
            opacity: 0;
            transform: translateY(30px) scale(0.95);
            animation: entradaSuave 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            transition: background-color 0.4s ease;
        }

        @keyframes entradaSuave {
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* --- BANNER --- */
        .banner {
            width: 100%;
            height: 180px; /* Un poco más alto para acompañar el ancho */
            background-image: url('bg-image.gif');
            background-size: cover;
            background-position: center;
            display: block;
        }

        header {
            padding: 0 2.5rem 1.5rem 2.5rem;
            position: relative;
        }

        /* --- FOTO DE PERFIL --- */
        .profile-pic-img {
            width: 130px; /* Más grande también */
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            border: 6px solid var(--bg-container);
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            margin-top: -65px;
            background-color: var(--bg-container);
            transition: border-color 0.4s ease;
        }

        h1 {
            font-size: 2.2rem; /* Texto más grande */
            margin: 15px 0 5px 0;
            color: var(--text-primary);
        }

        /* Verificado y Handle */
        .handle-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 1.5rem;
        }
        .handle-row p { margin: 0; color: var(--text-secondary); font-size: 1.1rem; }
        .verified-badge { width: 22px; height: 22px; display: flex; }

        .bio {
            color: var(--text-secondary);
            margin-bottom: 2rem;
            font-size: 1.1rem;
            line-height: 1.5;
        }

        /* --- MENÚ DE OPCIONES --- */
        .header-menu {
            position: absolute;
            top: 80px;
            right: 25px;
            z-index: 100;
        }
        .dots-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            transition: background 0.3s;
        }
        .dots-btn:hover { background: rgba(120,120,120,0.1); }
        .dots-btn svg path { fill: var(--text-secondary); }

        .dropdown {
            position: absolute;
            right: 0;
            top: 110%;
            background: #2d2d2d;
            border-radius: 16px;
            min-width: 180px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            display: none;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .dropdown.active { display: block; animation: fadeInMenu 0.3s ease; }
        @keyframes fadeInMenu { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        .dropdown-item {
            width: 100%;
            padding: 14px 18px;
            border: none;
            background: none;
            color: white;
            text-align: left;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.95rem;
        }
        .dropdown-item:hover { background: #404040; }

        /* --- BOTONES DE REDES --- */
        .links {
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding: 0 2.5rem;
        }
        .btn {
            text-decoration: none;
            color: white;
            padding: 16px;
            border-radius: 16px;
            font-weight: 700;
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }
        .btn:hover {
            filter: brightness(1.1);
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }
        .insta { background-color: #E4405F; }
        .github { background-color: #333; }
        .youtube { background-color: #FF0000; }

        footer {
            padding: 2.5rem 0;
            font-size: 0.9rem;
            color: #bbb;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="banner"></div>

        <header>
            <div class="header-menu">
                <button class="dots-btn" id="menuBtn" aria-label="Menú">
                    <svg width="28" height="28" viewBox="0 0 24 24">
                        <path d="M12 16a2 2 0 1 1 0 4 2 2 0 0 1 0-4zm0-6a2 2 0 1 1 0 4 2 2 0 0 1 0-4zm0-6a2 2 0 1 1 0 4 2 2 0 0 1 0-4z"/>
                    </svg>
                </button>
                <div class="dropdown" id="menuBox">
                    <button class="dropdown-item" id="darkToggle">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 3c.132 0 .263 0 .393.007a9 9 0 0 0 7.599 15.98A9 9 0 1 1 12 3z"/>
                        </svg>
                        Modo Oscuro
                    </button>
                </div>
            </div>

            <img src="pfp.webp" alt="Fuxyc" class="profile-pic-img">

            <h1>¡Hola a todos soy Fuxyc!</h1>

            <div class="handle-row">
                <p>@fuxyc</p>
                <span class="verified-badge">
                    <svg viewBox="0 0 48 48">
                        <circle fill="#1d9bf0" cx="24" cy="24" r="20"/>
                        <polyline fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" points="16,24 22,30 32,18"/>
                    </svg>
                </span>
            </div>

            <p class="bio">Este es mi nuevo blog personal.</p>
        </header>

        <main class="links">
            <a href="https://www.instagram.com/jarell.js" target="_blank" class="btn insta">Instagram</a>
            <a href="https://github.com/fuxyc" target="_blank" class="btn github">GitHub</a>
            <a href="https://www.youtube.com/@fuxyc" target="_blank" class="btn youtube">YouTube</a>
        </main>

        <footer>
            &copy; 2026 Fuxyc - Hecho con ❤️
        </footer>
    </div>

    <script>
        const menuBtn = document.getElementById('menuBtn');
        const menuBox = document.getElementById('menuBox');
        const darkToggle = document.getElementById('darkToggle');

        // Menú Dropdown
        menuBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            menuBox.classList.toggle('active');
        });

        document.addEventListener('click', () => menuBox.classList.remove('active'));

        // Modo Oscuro
        darkToggle.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('fuxyc-theme', isDark ? 'dark' : 'light');
        });

        if (localStorage.getItem('fuxyc-theme') === 'dark') {
            document.body.classList.add('dark-mode');
        }
    </script>
</body>
</html>
