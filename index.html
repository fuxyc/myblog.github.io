<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fuxyc | Mi Espacio Personal</title>
    
    <meta property="og:title" content="Fuxyc | Mi Espacio Personal">
    <meta property="og:description" content="Bienvenido a mi blog personal. Conoce mis proyectos y redes sociales.">
    <meta property="og:image" content="https://chatphotos.uk/og-image.jpg"> 
    <meta property="og:url" content="https://chatphotos.uk">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="favicon.png">

    <style>
        /* --- ESTILOS ADICIONALES PARA EL MENÚ (No rompen tu CSS original) --- */
        .header-menu {
            position: absolute;
            top: 65px; /* Ajustado para quedar debajo del banner */
            right: 20px;
            z-index: 100;
        }

        .dots-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 5px;
            border-radius: 50%;
            display: flex;
            align-items: center;
        }

        .dots-btn:hover { background: rgba(0,0,0,0.05); }

        .dropdown {
            position: absolute;
            right: 0;
            top: 100%;
            background: #2d2d2d;
            border-radius: 12px;
            min-width: 160px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            display: none;
            overflow: hidden;
        }

        .dropdown.active { display: block; }

        .dropdown-item {
            width: 100%;
            padding: 12px 15px;
            border: none;
            background: none;
            color: white;
            text-align: left;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .dropdown-item:hover { background: #3d3d3d; }

        /* --- LÓGICA DE MODO OSCURO SOBRE TU CSS --- */
        body.dark-mode {
            background-color: #121212;
        }
        body.dark-mode .container {
            background: #1e1e1e;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        body.dark-mode h1 { color: #ffffff; }
        body.dark-mode .profile-pic-img { border-color: #1e1e1e; background-color: #1e1e1e; }
        body.dark-mode .dots-btn svg path { fill: #ffffff; }
        body.dark-mode .dots-btn:hover { background: rgba(255,255,255,0.1); }

        /* Estilo para el verificado alineado */
        .handle-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            margin-bottom: 1.5rem;
        }
        .handle-row p { margin: 0; }
        .verified-badge { width: 18px; height: 18px; display: flex; }
    </style>
</head>

<body>
    <div class="container">
        <div class="banner"></div>

        <header>
            <div class="header-menu">
                <button class="dots-btn" id="menuBtn">
                    <svg width="24" height="24" viewBox="0 0 24 24">
                        <path fill="#666" d="M12 16a2 2 0 1 1 0 4 2 2 0 0 1 0-4zm0-6a2 2 0 1 1 0 4 2 2 0 0 1 0-4zm0-6a2 2 0 1 1 0 4 2 2 0 0 1 0-4z"/>
                    </svg>
                </button>
                <div class="dropdown" id="menuBox">
                    <button class="dropdown-item" id="darkToggle">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 3c.132 0 .263 0 .393.007a9 9 0 0 0 7.599 15.98A9 9 0 1 1 12 3z"/>
                        </svg>
                        Modo Oscuro
                    </button>
                </div>
            </div>

            <img src="pfp.webp" alt="Fuxyc" class="profile-pic-img">

            <h1>Hola</h1>

            <div class="handle-row">
                <p>@fuxyc</p>
                <span class="verified-badge">
                    <svg viewBox="0 0 48 48">
                        <circle fill="#1d9bf0" cx="24" cy="24" r="20"/>
                        <polyline fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" points="16,24 22,30 32,18"/>
                    </svg>
                </span>
            </div>

            <p>Este es mi nuevo blog personal.</p>
        </header>

        <main class="links">
            <a href="https://www.instagram.com/jarell.js" target="_blank" class="btn insta">Instagram</a>
            <a href="https://github.com/fuxyc" target="_blank" class="btn github">GitHub</a>
            <a href="https://www.youtube.com/@fuxyc" target="_blank" class="btn youtube">YouTube</a>
        </main>

        <footer>
            &copy; 2026 Fuxyc - Hecho con ❤️
        </footer>
    </div>

    <script>
        const menuBtn = document.getElementById('menuBtn');
        const menuBox = document.getElementById('menuBox');
        const darkToggle = document.getElementById('darkToggle');

        // Abrir/Cerrar menú
        menuBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            menuBox.classList.toggle('active');
        });

        // Cerrar al hacer clic fuera
        document.addEventListener('click', () => menuBox.classList.remove('active'));

        // Modo Oscuro
        darkToggle.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('fuxyc-theme', isDark ? 'dark' : 'light');
        });

        // Cargar preferencia guardada
        if (localStorage.getItem('fuxyc-theme') === 'dark') {
            document.body.classList.add('dark-mode');
        }
    </script>
</body>
</html>
