<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fuxyc | Mi Espacio Personal</title>
    
    <meta property="og:title" content="Fuxyc | Mi Espacio Personal">
    <meta property="og:description" content="Bienvenido a mi blog personal. Conoce mis proyectos y redes sociales.">
    <meta property="og:image" content="https://chatphotos.uk/og-image.jpg"> 
    <meta property="og:url" content="https://chatphotos.uk">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    
    <link rel="icon" type="image/png" href="favicon.png">

    <style>
        /* --- ESTILOS PARA EL BANNER Y LA PFP --- */
        
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f8f9fa;
            margin: 0; /* Asegura que no haya márgenes extraños */
        }

        /* Estilos del Contenedor del Perfil (la tarjeta blanca) */
        .profile-container {
            max-width: 600px;
            margin: 50px auto 100px;
            background-color: #ffffff;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            opacity: 0;
            animation: fadeIn 1s ease-out forwards;
        }

        /* ========================================= */
        /* ESTILOS DEL BANNER GIF           */
        /* ========================================= */
        .profile-banner {
            height: 200px;
            /* --- ESTE ES EL CAMBIO CLAVE --- */
            background-image: url('bg-image.gif'); /* Cargamos tu GIF */
            /* ------------------------------- */
            background-size: cover;
            background-position: center;
            position: relative;
            
            /* Mantengo el filtro para que la PFP y el texto resalten */
            filter: brightness(1.1); 
            
            opacity: 0;
            animation: slideInFromTop 1s ease-out 0.2s forwards;
        }

        /* Contenedor del Perfil (para alinear la PFP) */
        .profile-header {
            padding: 0 40px 20px;
            text-align: center;
            position: relative;
            margin-top: -60px;
            z-index: 10;
        }

        /* Estilos de la PFP Circular */
        .profile-pic {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 5px solid #ffffff;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            object-fit: cover;
            opacity: 0;
            animation: popIn 1s ease-out 0.5s forwards;
        }

        /* Animaciones */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideInFromTop { from { transform: translateY(-30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes popIn { 0% { transform: scale(0.8); opacity: 0; } 80% { transform: scale(1.05); opacity: 0.8; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes slideInFromBottom { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* Estilos del Título y Texto */
        h1.profile-name {
            font-size: 2.5em;
            font-weight: 700;
            color: #333;
            margin-top: 20px;
            margin-bottom: 5px;
            opacity: 0;
            animation: slideInFromBottom 1s ease-out 0.8s forwards;
        }

        p.profile-bio {
            font-size: 1.1em;
            color: #777;
            margin-bottom: 30px;
            opacity: 0;
            animation: slideInFromBottom 1s ease-out 1s forwards;
        }

        /* Estilos de los Botones (tus enlaces) */
        .profile-links {
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding: 0 40px;
            margin-bottom: 40px;
            opacity: 0;
            animation: slideInFromBottom 1s ease-out 1.2s forwards;
        }

        .btn-profile {
            display: block;
            text-align: center;
            padding: 15px 20px;
            color: #ffffff;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-profile:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        /* Colores específicos para cada botón */
        .btn-instagram { background-color: #E4405F; }
        .btn-github { background-color: #333333; }
        .btn-youtube { background-color: #FF0000; }

        /* Pie de Página */
        footer.profile-footer {
            text-align: center;
            font-size: 0.9em;
            color: #aaa;
            padding-bottom: 30px;
        }

        /* Adaptación para Móviles */
        @media (max-width: 600px) {
            .profile-container { margin: 0; border-radius: 0; width: 100%; }
            .profile-header { padding: 0 20px 20px; }
            .profile-links { padding: 0 20px; }
        }
    </style>
</head>

<body>
    <div class="profile-container">
        
        <div class="profile-banner"></div>
        
        <div class="profile-header">
            <img src="pfp.webp" alt="Foto de perfil de Fuxyc" class="profile-pic">
            
            <h1 class="profile-name">¡Hola mundo!</h1>
            <p class="profile-bio">Este es mi nuevo blog personal.</p>
        </div>
        
        <main class="profile-links">
            <a href="https://www.instagram.com/jarell.js" target="_blank" rel="noopener noreferrer" class="btn-profile btn-instagram">Instagram</a>
            <a href="https://github.com/fuxyc" target="_blank" rel="noopener noreferrer" class="btn-profile btn-github">GitHub</a>
            <a href="https://www.youtube.com/@fuxyc" target="_blank" rel="noopener noreferrer" class="btn-profile btn-youtube">YouTube</a>
        </main>
        
        <footer class="profile-footer">
            <p>&copy; 2026 Fuxyc - Hecho con ❤️</p>
        </footer>
        
    </div>
</body>
</html>
