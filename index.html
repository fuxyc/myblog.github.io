<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fuxyc | Perfil y Blog</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        :root {
            --primary: #0070f3;
            --background: #ffffff;
            --text: #1a1a1a;
            --gray: #666666;
            --insta: #E4405F;
            --git: #333333;
            --yt: #FF0000;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.15);
        }

        body.dark-mode {
            --background: #1e1e1e;
            --text: #ffffff;
            --gray: #bbb;
            background-color: #121212;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: #f4f7f6;
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            transition: all 0.5s ease;
        }

        .wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 1200px;
            gap: 30px; /* Más espacio entre perfil y blog */
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* --- CONTENEDOR PRINCIPAL (LINKTREE) --- */
        .container {
            background: var(--background);
            border-radius: 32px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            text-align: center;
            max-width: 450px;
            width: 100%;
            overflow: hidden;
            flex-shrink: 0;
            transition: all 0.6s ease;
        }

        .wrapper.blog-active .container {
            max-width: 360px;
            transform: scale(0.95);
        }

        /* --- SECCIÓN DE BLOGS (EFECTO ESPEJO) --- */
        .blog-section {
            width: 0;
            opacity: 0;
            height: 85vh;
            background: rgba(20, 20, 20, 0.6);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 32px;
            border: 1px solid rgba(255,255,255,0.1);
            overflow-y: auto;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 0;
        }

        .wrapper.blog-active .blog-section {
            width: 650px;
            opacity: 1;
            padding: 35px;
        }

        /* --- TARJETAS DE POSTS --- */
        .post-card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 24px !important; /* Corregido espaciado amontonado */
            margin-bottom: 25px;
            text-align: left;
            transition: all 0.3s ease;
        }

        .post-card:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-4px);
            border-color: var(--primary);
        }

        .post-content p {
            margin: 0 0 12px 0; /* Espaciado entre párrafos dentro del post */
            line-height: 1.6;
        }

        /* --- DISEÑO DE PERFIL --- */
        .banner { width: 100%; height: 160px; background-image: url('bg-image.gif'); background-size: cover; background-position: center; }
        header { padding: 0 2.5rem 1.5rem 2.5rem; position: relative; }
        .profile-pic-img { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 6px solid var(--background); margin-top: -60px; background-color: var(--background); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        
        .menu-wrapper { position: absolute; top: 25px; right: 25px; }
        .dots-btn { background: rgba(0,0,0,0.1); border: none; cursor: pointer; padding: 8px; border-radius: 50%; }
        .dropdown { position: absolute; right: 0; top: 45px; background: #2d2d2d; border-radius: 12px; min-width: 170px; display: none; z-index: 1000; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .dropdown.active { display: block; }
        .dropdown-item { width: 100%; padding: 14px 18px; border: none; background: none; color: white; text-align: left; cursor: pointer; font-family: 'Inter', sans-serif; }
        .dropdown-item:hover { background: #404040; }

        /* --- BOTONES --- */
        .links { display: flex; flex-direction: column; gap: 14px; padding: 0 2.5rem; }
        .btn { text-decoration: none; color: white; padding: 16px; border-radius: 16px; font-weight: 700; transition: all 0.3s ease; text-align: center; border: none; cursor: pointer; }
        .insta { background-color: var(--insta); }
        .github { background-color: var(--git); }
        .youtube { background-color: var(--yt); }
        .blogs-btn { background-color: var(--primary); }
        .btn:hover { filter: brightness(1.1); transform: translateY(-2px); }

        /* Ajustes para móviles */
        @media (max-width: 900px) {
            .wrapper.blog-active { flex-direction: column; padding: 20px; }
            .wrapper.blog-active .blog-section { width: 100%; height: auto; max-height: 80vh; }
        }
    </style>
</head>

<body>
    <div class="wrapper" id="mainWrapper">
        <div class="container">
            <div class="banner"></div>
            <header>
                <div class="menu-wrapper">
                    <button class="dots-btn" id="menuBtn">
                        <svg width="24" height="24" viewBox="0 0 24 24"><path fill="currentColor" d="M12 16a2 2 0 1 1 0 4 2 2 0 0 1 0-4zm0-6a2 2 0 1 1 0 4 2 2 0 0 1 0-4zm0-6a2 2 0 1 1 0 4 2 2 0 0 1 0-4z"/></svg>
                    </button>
                    <div class="dropdown" id="menuBox">
                        <button class="dropdown-item" id="darkToggle">Cambiar Tema</button>
                        <button class="dropdown-item" onclick="window.netlifyIdentity.open()">Administrar</button>
                    </div>
                </div>

                <img src="pfp.webp" alt="Fuxyc" class="profile-pic-img">
                <h1 style="margin: 15px 0 5px 0; font-size: 1.8rem;">¡Hola soy Fuxyc!</h1>
                
                <div style="display: flex; align-items: center; justify-content: center; gap: 6px; margin-bottom: 1.5rem;">
                    <span style="color: var(--gray);">@fuxyc</span>
                    <svg width="16" height="16" viewBox="0 0 48 48"><circle fill="#1d9bf0" cx="24" cy="24" r="20"/><polyline fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" points="16,24 22,30 32,18"/></svg>
                </div>
                <p id="bio" style="color: var(--gray); font-size: 0.95rem; margin-bottom: 2rem;">Este es mi nuevo blog personal.</p>
            </header>

            <main class="links">
                <a href="https://instagram.com/jarell.js" target="_blank" class="btn insta">Instagram</a>
                <a href="https://github.com/fuxyc" target="_blank" class="btn github">GitHub</a>
                <a href="https://youtube.com/@fuxyc" target="_blank" class="btn youtube">YouTube</a>
                <button class="btn blogs-btn" id="blogBtn">Explorar Blogs</button>
            </main>

            <footer style="padding: 2.5rem 0; font-size: 0.8rem; color: #888;">
                &copy; 2026 Fuxyc - Hecho con ❤️
            </footer>
        </div>

        <div class="blog-section" id="blogSection">
            <h2 style="color: white; margin-bottom: 30px; font-size: 1.8rem;">Mis Publicaciones</h2>
            <div id="postsContainer"></div>
            <button class="btn github" id="closeBlog" style="width: 100%; margin-top: 10px;">Cerrar Blogs</button>
        </div>
    </div>

    <script>
        // Lógica de Menú y Tema
        const menuBtn = document.getElementById('menuBtn');
        const menuBox = document.getElementById('menuBox');
        const darkToggle = document.getElementById('darkToggle');
        const blogBtn = document.getElementById('blogBtn');
        const closeBlog = document.getElementById('closeBlog');
        const wrapper = document.getElementById('mainWrapper');
        const postsContainer = document.getElementById('postsContainer');

        menuBtn.addEventListener('click', (e) => { e.stopPropagation(); menuBox.classList.toggle('active'); });
        document.addEventListener('click', () => menuBox.classList.remove('active'));

        darkToggle.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
        });

        if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-mode');

        // Lógica de carga de Blogs
        blogBtn.addEventListener('click', () => {
            wrapper.classList.add('blog-active');
            loadPosts();
        });

        closeBlog.addEventListener('click', () => wrapper.classList.remove('blog-active'));

        async function loadPosts() {
            const repo = "fuxyc/myblog.github.io"; 
            const folder = "content/blog";
            const apiUrl = `https://api.github.com/repos/${repo}/contents/${folder}`;

            try {
                const response = await fetch(apiUrl);
                const files = await response.json();
                postsContainer.innerHTML = "";

                if (!Array.isArray(files)) return;

                for (const file of files) {
                    if (file.name.endsWith('.md')) {
                        const res = await fetch(file.download_url);
                        const content = await res.text();
                        const parts = content.split('---');
                        const frontmatter = parts[1];
                        const rawBody = parts[2] || "";

                        const title = frontmatter.match(/title:\s*(.*)/)?.[1]?.replace(/"/g, '') || "Sin título";
                        const date = frontmatter.match(/date:\s*(.*)/)?.[1] || "";

                        const card = document.createElement('div');
                        card.className = 'post-card';
                        card.innerHTML = `
                            <div style="display: flex; gap: 18px; align-items: flex-start;">
                                <img src="pfp.webp" style="width: 52px; height: 52px; border-radius: 50%; object-fit: cover; flex-shrink: 0; border: 1px solid rgba(255,255,255,0.1);">
                                <div style="flex-grow: 1; min-width: 0;">
                                    <div style="display: flex; align-items: center; gap: 6px; margin-bottom: 6px; flex-wrap: wrap;">
                                        <span style="font-weight: 800; color: var(--text); font-size: 1rem;">Fuxyc</span>
                                        <svg width="16" height="16" viewBox="0 0 48 48"><circle fill="#1d9bf0" cx="24" cy="24" r="20"/><polyline fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" points="16,24 22,30 32,18"/></svg>
                                        <span style="color: var(--gray); font-size: 0.9rem;">@fuxyc • ${date ? new Date(date).toLocaleDateString() : ''}</span>
                                    </div>
                                    <h3 style="margin: 0 0 10px 0; font-size: 1.2rem; color: var(--primary); line-height: 1.3;">${title}</h3>
                                    <div class="post-content" style="color: var(--text); font-size: 1rem; opacity: 0.95;">
                                        ${marked.parse(rawBody)}
                                    </div>
                                </div>
                            </div>
                        `;
                        postsContainer.appendChild(card);
                    }
                }
            } catch (err) {
                postsContainer.innerHTML = "<p style='color:gray; padding:20px;'>No se pudieron cargar los posts.</p>";
            }
        }
    </script>
</body>
</html>
