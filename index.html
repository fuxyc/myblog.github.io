<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fuxyc | Mi Espacio Personal</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="favicon.png">

    <style>
        /* --- VARIABLES DE COLOR --- */
        :root {
            --bg-body: #f4f7f6;
            --bg-container: #ffffff;
            --text-primary: #1a1a1a;
            --text-secondary: #666666;
        }

        body.dark-mode {
            --bg-body: #121212;
            --bg-container: #1e1e1e;
            --text-primary: #ffffff;
            --text-secondary: #bbb;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-body);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            transition: background-color 0.4s ease;
        }

        /* --- CONTENEDOR CON ANIMACIÓN --- */
        .container {
            background: var(--bg-container);
            border-radius: 32px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            text-align: center;
            max-width: 500px;
            width: 90%;
            overflow: hidden;
            margin: 40px 0;
            position: relative;
            opacity: 0;
            transform: translateY(30px);
            animation: entradaSuave 0.8s ease-out forwards;
        }

        @keyframes entradaSuave {
            to { opacity: 1; transform: translateY(0); }
        }

        .banner {
            width: 100%;
            height: 150px;
            background-image: url('bg-image.gif');
            background-size: cover;
            background-position: center;
        }

        header {
            padding: 0 2rem 1.5rem 2rem;
            position: relative;
        }

        .profile-pic-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid var(--bg-container);
            margin-top: -60px;
            background-color: var(--bg-container);
        }

        /* --- BOTÓN DE TRES PUNTOS (CORREGIDO: Fuera del flujo del texto) --- */
        .menu-wrapper {
            position: absolute;
            top: 20px;
            right: 20px;
        }

        .dots-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            display: flex;
            transition: background 0.3s;
        }

        .dots-btn:hover { background: rgba(120, 120, 120, 0.1); }
        .dots-btn svg path { fill: var(--text-secondary); }

        .dropdown {
            position: absolute;
            right: 0;
            top: 45px;
            background: #2d2d2d;
            border-radius: 12px;
            min-width: 160px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            display: none;
            z-index: 1000;
        }

        .dropdown.active { display: block; }

        .dropdown-item {
            width: 100%;
            padding: 12px 15px;
            border: none;
            background: none;
            color: white;
            text-align: left;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .dropdown-item:hover { background: #3d3d3d; }

        /* --- TEXTOS --- */
        h1 {
            font-size: 2rem;
            margin: 10px 0;
            color: var(--text-primary);
        }

        .handle-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-bottom: 1rem;
        }
        .handle-row p { margin: 0; color: var(--text-secondary); }
        .verified-badge { width: 18px; height: 18px; }

        .bio { color: var(--text-secondary); margin-bottom: 2rem; }

        /* --- BOTONES --- */
        .links {
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 0 2.5rem;
        }
        .btn {
            text-decoration: none;
            color: white;
            padding: 15px;
            border-radius: 14px;
            font-weight: bold;
            transition: transform 0.2s;
        }
        .btn:hover { transform: translateY(-2px); filter: brightness(1.1); }
        .insta { background-color: #E4405F; }
        .github { background-color: #333; }
        .youtube { background-color: #FF0000; }

        footer { padding: 2rem 0; font-size: 0.8rem; color: #bbb; }
    </style>
</head>

<body>
    <div class="container">
        <div class="banner"></div>

        <header>
            <div class="menu-wrapper">
                <button class="dots-btn" id="menuBtn">
                    <svg width="24" height="24" viewBox="0 0 24 24">
                        <path d="M12 16a2 2 0 1 1 0 4 2 2 0 0 1 0-4zm0-6a2 2 0 1 1 0 4 2 2 0 0 1 0-4zm0-6a2 2 0 1 1 0 4 2 2 0 0 1 0-4z"/>
                    </svg>
                </button>
                <div class="dropdown" id="menuBox">
                    <button class="dropdown-item" id="darkToggle">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 3c.132 0 .263 0 .393.007a9 9 0 0 0 7.599 15.98A9 9 0 1 1 12 3z"/>
                        </svg>
                        <span id="themeText">Modo Oscuro</span>
                    </button>
                </div>
            </div>

            <img src="pfp.webp" alt="Fuxyc" class="profile-pic-img">

            <h1>¡Hola a todos soy Fuxyc!</h1>

            <div class="handle-row">
                <p>@fuxyc</p>
                <span class="verified-badge">
                    <svg viewBox="0 0 48 48">
                        <circle fill="#1d9bf0" cx="24" cy="24" r="20"/>
                        <polyline fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" points="16,24 22,30 32,18"/>
                    </svg>
                </span>
            </div>

            <p class="bio">Este es mi nuevo blog personal.</p>
        </header>

        <main class="links">
            <a href="https://www.instagram.com/jarell.js" target="_blank" class="btn insta">Instagram</a>
            <a href="https://github.com/fuxyc" target="_blank" class="btn github">GitHub</a>
            <a href="https://www.youtube.com/@fuxyc" target="_blank" class="btn youtube">YouTube</a>
        </main>

        <footer>
            &copy; 2026 Fuxyc - Hecho con ❤️
        </footer>
    </div>

    <script>
        const menuBtn = document.getElementById('menuBtn');
        const menuBox = document.getElementById('menuBox');
        const darkToggle = document.getElementById('darkToggle');
        const themeText = document.getElementById('themeText');

        // Función para actualizar el texto según el modo
        function updateThemeText() {
            if (document.body.classList.contains('dark-mode')) {
                themeText.innerText = 'Modo Claro';
            } else {
                themeText.innerText = 'Modo Oscuro';
            }
        }

        // Abrir/Cerrar menú
        menuBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            menuBox.classList.toggle('active');
        });

        document.addEventListener('click', () => menuBox.classList.remove('active'));

        // Cambio de Modo Oscuro
        darkToggle.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('fuxyc-theme', isDark ? 'dark' : 'light');
            updateThemeText(); // Actualiza el texto al hacer clic
        });

        // Cargar preferencia y poner el texto correcto al iniciar
        if (localStorage.getItem('fuxyc-theme') === 'dark') {
            document.body.classList.add('dark-mode');
        }
        updateThemeText(); 
    </script>
</body>
</html>
