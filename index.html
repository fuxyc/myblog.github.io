<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fuxyc | Mi Espacio Personal</title>
    
    <meta property="og:title" content="Fuxyc | Mi Espacio Personal">
    <meta property="og:description" content="Bienvenido a mi blog personal. Conoce mis proyectos y redes sociales.">
    <meta property="og:image" content="https://chatphotos.uk/og-image.jpg"> 
    <meta property="og:url" content="https://chatphotos.uk">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    
    <link rel="icon" type="image/png" href="favicon.png">

    <style>
        /* --- ESTILOS INTERNOS (Mantenlos aquí para las animaciones) --- */
        
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f8f9fa;
            margin: 0; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .profile-container {
            max-width: 600px;
            width: 90%;
            background-color: #ffffff;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            opacity: 0;
            animation: fadeIn 1s ease-out forwards;
            margin: 50px 0;
        }

        /* --- ESTILOS DEL BANNER GIF --- */
        .profile-banner {
            width: 100%;
            height: 200px;
            display: block;
            background-image: url('bg-image.gif'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
            filter: brightness(1.1); 
            opacity: 0;
            animation: slideInFromTop 1s ease-out 0.2s forwards;
        }

        .profile-header {
            padding: 0 40px 20px;
            text-align: center;
            position: relative;
            margin-top: -60px; /* Superposición de la PFP */
            z-index: 10;
        }

        .profile-pic {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 5px solid #ffffff;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            object-fit: cover;
            background-color: white;
            opacity: 0;
            animation: popIn 1s ease-out 0.5s forwards;
        }

        /* Título de bienvenida */
        h1.profile-name {
            font-size: 2.5em; 
            font-weight: 700;
            color: #333;
            margin-top: 20px;
            margin-bottom: 5px;
            opacity: 0;
            animation: slideInFromBottom 1s ease-out 0.8s forwards;
        }

        /* --- NUEVO CONTENEDOR PARA EL @ Y VERIFICADO (CORREGIDO) --- */
    .handle-container {
        display: flex;
        justify-content: center;
        align-items: center; /* Centrado vertical perfecto */
        gap: 6px; 
        margin-bottom: 20px;
    
    /* El truco mágico: movemos todo el bloque un poco hacia arriba */
    transform: translateY(-5px); 
    
    opacity: 0;
    animation: slideInFromBottom 1s ease-out 1s forwards;
}
        }

        /* El @Fuxyc (Estilo Gris Twitter) */
        .profile-handle {
            color: #65676b; /* Gris claro profesional */
            font-size: 1.1em;
            font-weight: 400;
            margin: 0; /* Eliminamos márgenes para alinearlo bien */
        }

        /* El icono verificado (SVG) */
        .verified-icon {
            width: 22px;  /* Tamaño un poco más pequeño para que combine con el @ */
            height: 22px;
            display: flex;
        }

        .profile-bio {
            font-size: 1.1em;
            color: #777;
            margin-bottom: 30px;
            opacity: 0;
            animation: slideInFromBottom 1s ease-out 1.2s forwards;
        }

        /* --- BOTONES Y ENLACES --- */
        .profile-links {
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding: 0 40px;
            margin-bottom: 40px;
            opacity: 0;
            animation: slideInFromBottom 1s ease-out 1.4s forwards;
        }

        .btn-profile {
            display: block;
            text-align: center;
            padding: 15px 20px;
            color: #ffffff;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-profile:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .btn-instagram { background-color: #E4405F; }
        .btn-github { background-color: #333333; }
        .btn-youtube { background-color: #FF0000; }

        footer.profile-footer {
            text-align: center;
            font-size: 0.9em;
            color: #aaa;
            padding-bottom: 30px;
        }

        /* Animaciones */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideInFromTop { from { transform: translateY(-30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes popIn { 0% { transform: scale(0.8); opacity: 0; } 80% { transform: scale(1.05); opacity: 0.8; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes slideInFromBottom { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        @media (max-width: 600px) {
            .profile-container { margin: 0; border-radius: 0; width: 100%; }
            .profile-header { padding: 0 20px 20px; }
            .profile-links { padding: 0 20px; }
            h1.profile-name { font-size: 2em; }
            .verified-icon { width: 18px; height: 18px; }
        }
    </style>
</head>

<body>
    <div class="profile-container">
        
        <div class="profile-banner"></div>
        
        <div class="profile-header">
            <img src="pfp.webp" alt="Foto de perfil de Fuxyc" class="profile-pic">
            
            <h1 class="profile-name">¡Hola mundo!</h1>
            
            <div class="handle-container">
                <p class="profile-handle">@Fuxyc</p>
                <span class="verified-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48px" height="48px">
                        <circle fill="#1d9bf0" cx="24" cy="24" r="20"/>
                        <polyline fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" stroke-miterlimit="10" points="16,24 22,30 32,18"/>
                    </svg>
                </span>
            </div>
            
            <p class="profile-bio">Este es mi nuevo blog personal.</p>
        </div>
        
        <main class="profile-links">
            <a href="https://www.instagram.com/jarell.js" target="_blank" rel="noopener noreferrer" class="btn-profile btn-instagram">Instagram</a>
            <a href="https://github.com/fuxyc" target="_blank" rel="noopener noreferrer" class="btn-profile btn-github">GitHub</a>
            <a href="https://www.youtube.com/@fuxyc" target="_blank" rel="noopener noreferrer" class="btn-profile btn-youtube">YouTube</a>
        </main>
        
        <footer class="profile-footer">
            <p>&copy; 2026 Fuxyc - Hecho con ❤️</p>
        </footer>
        
    </div>
</body>
</html>
